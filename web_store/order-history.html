<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - The Curiosity Cabins</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/toast.css">
    <style>
        .order-history-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 40px;
        }

        .order-history-header {
            margin-bottom: 30px;
        }

        .order-history-header h1 {
            font-size: 32px;
            color: #333;
            margin: 0 0 10px 0;
        }

        .order-history-header p {
            color: #666;
            font-size: 14px;
        }

        .order-history-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .order-history-table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .order-history-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #667eea;
        }

        .order-history-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .order-history-table tbody tr:hover {
            background: #f8f9ff;
            transition: background 0.2s ease;
        }

        .order-id {
            font-weight: 600;
            color: #667eea;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .order-date {
            color: #666;
            font-size: 13px;
        }

        .order-total {
            font-weight: 600;
            color: #333;
        }

        .order-status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-cancelled {
            background: #f8d7da;
            color: #721c24;
        }

        .order-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            border: 1px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-small:hover {
            background: #667eea;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            color: #666;
            margin-bottom: 10px;
        }

        /* Order Details Modal */
        .order-details-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .order-details-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .order-details-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .order-details-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .order-details-header h2 {
            margin: 0;
            font-size: 20px;
        }

        .close-modal {
            font-size: 28px;
            cursor: pointer;
            color: #999;
            background: none;
            border: none;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            color: #333;
        }

        .order-detail-item {
            margin-bottom: 15px;
        }

        .order-detail-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .order-detail-value {
            font-size: 16px;
            color: #333;
            margin-top: 5px;
        }

        .order-items-list {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
        }

        .order-item-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }

        .order-item-row:last-child {
            border-bottom: none;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 15px;
        }

        .modal-actions button {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .modal-actions button:hover {
            background: #667eea;
            color: white;
        }

        .modal-actions .btn-primary {
            background: #667eea;
            color: white;
        }

        .modal-actions .btn-primary:hover {
            background: #764ba2;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <a href="index.html" class="logo">The Curiosity Cabins</a>
        </div>
        <div class="navbar-right">
            <a href="cart.html" class="nav-link">Cart</a>
            <a href="order-history.html" class="nav-link active">Order History</a>
        </div>
    </nav>

    <div class="order-history-container">
        <div class="order-history-header">
            <h1>Your Order History</h1>
            <p id="customer-email-display">Orders for: <span>loading...</span></p>
        </div>

        <div id="orders-content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading your orders...</p>
            </div>
        </div>
    </div>

    <!-- Order Details Modal -->
    <div id="order-details-modal" class="order-details-modal">
        <div class="order-details-content">
            <div class="order-details-header">
                <h2>Order Details</h2>
                <button class="close-modal">&times;</button>
            </div>

            <div id="modal-body">
                <!-- Order details will be inserted here -->
            </div>

            <div class="modal-actions">
                <button onclick="closeOrderDetails()">Close</button>
                <button class="btn-primary" onclick="reorderItems()">Reorder</button>
            </div>
        </div>
    </div>

    <script>
        import Toast from './toast.js';
        const toast = Toast();

        let currentOrderId = null;
        let currentOrderItems = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const customerEmail = localStorage.getItem('customerEmail') || '';
            
            if (!customerEmail) {
                document.getElementById('orders-content').innerHTML = `
                    <div class="error-message">
                        <strong>Not Logged In</strong>
                        <p>Please log in to view your order history. <a href="index.html">Return to store</a></p>
                    </div>
                `;
                return;
            }

            document.querySelector('#customer-email-display span').textContent = customerEmail;
            await loadOrderHistory(customerEmail);
        });

        async function loadOrderHistory(customerEmail) {
            try {
                const params = new URLSearchParams({
                    username: 'web_store_user',
                    password: 'web_store_pass',
                    command: 'orderhistory'
                });

                const response = await fetch(`https://demo.pgbc.ai/cgi-bin/boudica_pos?${params.toString()}`);
                if (!response.ok) {
                    throw new Error('Failed to fetch orders');
                }

                const data = await response.json();

                if (!data.orders || data.orders.length === 0) {
                    document.getElementById('orders-content').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📦</div>
                            <h2>No Orders Yet</h2>
                            <p>You haven't placed any orders yet. Start shopping!</p>
                            <a href="index.html" style="color: #667eea; text-decoration: none; font-weight: 600;">Browse Products</a>
                        </div>
                    `;
                    return;
                }

                renderOrderTable(data.orders);
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('orders-content').innerHTML = `
                    <div class="error-message">
                        <strong>Error Loading Orders</strong>
                        <p>${error.message}</p>
                    </div>
                `;
                toast.showToast('Error loading order history', 'error');
            }
        }

        function renderOrderTable(orders) {
            let html = `
                <table class="order-history-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Date</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            orders.forEach(order => {
                const date = new Date(order.order_date).toLocaleDateString('en-GB', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });

                let itemsPreview = '';
                try {
                    const itemsArray = JSON.parse(order.items);
                    if (Array.isArray(itemsArray)) {
                        itemsPreview = itemsArray.length + ' item' + (itemsArray.length > 1 ? 's' : '');
                    }
                } catch (e) {
                    itemsPreview = 'See details';
                }

                const statusClass = 'status-' + (order.order_status || 'completed').toLowerCase();

                html += `
                    <tr>
                        <td><span class="order-id">${order.order_id}</span></td>
                        <td><span class="order-date">${date}</span></td>
                        <td>${itemsPreview}</td>
                        <td><span class="order-total">£${parseFloat(order.total_value).toFixed(2)}</span></td>
                        <td><span class="order-status ${statusClass}">${order.order_status || 'Completed'}</span></td>
                        <td>
                            <div class="order-actions">
                                <button class="btn-small" onclick="viewOrderDetails('${order.order_id}', '${order.items.replace(/'/g, "\\'")}', ${order.total_value}, '${order.order_date}', '${order.order_status}', ${order.subtotal || 'null'}, ${order.vat_amount || 'null'})">Details</button>
                                <button class="btn-small" onclick="window.location.href='receipt.html?order_id=${encodeURIComponent(order.order_id)}'">Receipt</button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            document.getElementById('orders-content').innerHTML = html;
        }

        function viewOrderDetails(orderId, itemsJson, total, date, status, subtotal = null, vatAmount = null) {
            currentOrderId = orderId;
            
            try {
                currentOrderItems = JSON.parse(itemsJson);
            } catch (e) {
                console.error('Failed to parse items:', e);
                currentOrderItems = [];
            }

            const orderDate = new Date(date).toLocaleDateString('en-GB', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            let itemsHtml = '<div class="order-items-list">';
            if (Array.isArray(currentOrderItems)) {
                currentOrderItems.forEach(item => {
                    const lineTotal = (parseFloat(item.price) * parseInt(item.quantity)).toFixed(2);
                    itemsHtml += `
                        <div class="order-item-row">
                            <span>${item.barcode} x${item.quantity}</span>
                            <span>£${lineTotal}</span>
                        </div>
                    `;
                });
            }
            itemsHtml += '</div>';

            const modalBody = document.getElementById('modal-body');
            
            // Calculate VAT if not provided
            let displaySubtotal = subtotal ? parseFloat(subtotal).toFixed(2) : null;
            let displayVat = vatAmount ? parseFloat(vatAmount).toFixed(2) : null;
            
            if (!displaySubtotal || !displayVat) {
                // Assume 20% VAT if not provided (legacy orders)
                const totalVal = parseFloat(total);
                displayVat = (totalVal * 0.20 / 1.20).toFixed(2);
                displaySubtotal = (totalVal - parseFloat(displayVat)).toFixed(2);
            }
            
            modalBody.innerHTML = `
                <div class="order-detail-item">
                    <div class="order-detail-label">Order ID</div>
                    <div class="order-detail-value" style="font-family: 'Courier New', monospace;">${orderId}</div>
                </div>

                <div class="order-detail-item">
                    <div class="order-detail-label">Order Date</div>
                    <div class="order-detail-value">${orderDate}</div>
                </div>

                <div class="order-detail-item">
                    <div class="order-detail-label">Items</div>
                    ${itemsHtml}
                </div>

                <div class="order-detail-item">
                    <div class="order-detail-label">Subtotal</div>
                    <div class="order-detail-value">£${displaySubtotal}</div>
                </div>

                <div class="order-detail-item">
                    <div class="order-detail-label">VAT (20%)</div>
                    <div class="order-detail-value">£${displayVat}</div>
                </div>

                <div class="order-detail-item">
                    <div class="order-detail-label">Total</div>
                    <div class="order-detail-value" style="font-size: 20px; color: #667eea; font-weight: 600;">£${parseFloat(total).toFixed(2)}</div>
                </div>

                <div class="order-detail-item">
                    <div class="order-detail-label">Status</div>
                    <div class="order-detail-value">
                        <span class="order-status status-${(status || 'completed').toLowerCase()}">${status || 'Completed'}</span>
                    </div>
                </div>
            `;

            document.getElementById('order-details-modal').classList.add('active');
        }

        function closeOrderDetails() {
            document.getElementById('order-details-modal').classList.remove('active');
            currentOrderId = null;
            currentOrderItems = null;
        }

        function reorderItems() {
            if (!currentOrderItems || !Array.isArray(currentOrderItems)) {
                toast.showToast('Unable to reorder: items not found', 'error');
                return;
            }

            // Get current cart
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');

            // Add items from this order to cart
            currentOrderItems.forEach(item => {
                const existingItem = cart.find(c => c.id === item.barcode);
                if (existingItem) {
                    existingItem.quantity += parseInt(item.quantity);
                } else {
                    cart.push({
                        id: item.barcode,
                        name: item.barcode, // Will be resolved by app.js
                        price: parseFloat(item.price),
                        quantity: parseInt(item.quantity),
                        image: '/assets/placeholder.png'
                    });
                }
            });

            localStorage.setItem('cart', JSON.stringify(cart));
            toast.showToast('Items added to cart! Redirecting...', 'success');

            setTimeout(() => {
                window.location.href = 'cart.html';
            }, 1500);
        }

        document.getElementById('order-details-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('order-details-modal')) {
                closeOrderDetails();
            }
        });

        document.querySelector('.close-modal').addEventListener('click', closeOrderDetails);
    </script>
</body>
</html>
